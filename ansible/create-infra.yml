---
- name: Desplegar infraestructura Linux segura
  hosts: localhost
  connection: local

  vars_files:
    - vars.yml

  tasks:
    - name: Crear grupo de recursos
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ grupo_recursos }}"
        location: "{{ region }}"

    - name: Crear red virtual
      azure.azcollection.azure_rm_virtualnetwork:
        resource_group: "{{ grupo_recursos }}"
        name: "{{ nombre_red }}"
        address_prefixes:
          - "10.0.0.0/16"

    - name: Crear subred Linux
      azure.azcollection.azure_rm_subnet:
        resource_group: "{{ grupo_recursos }}"
        virtual_network_name: "{{ nombre_red }}"
        name: "{{ nombre_subred }}"
        address_prefix: "10.0.1.0/24"

    - name: Crear firewall NSG
      azure.azcollection.azure_rm_securitygroup:
        resource_group: "{{ grupo_recursos }}"
        name: "{{ nombre_nsg }}"
        rules:
          - name: permitir-ssh
            protocol: Tcp
            destination_port_range: 22
            access: Allow
            priority: 1000
            direction: Inbound

    - name: Crear IP pública
      azure.azcollection.azure_rm_publicipaddress:
        resource_group: "{{ grupo_recursos }}"
        allocation_method: Static
        name: ip-publica-vm
        sku: Standard

    - name: Crear NIC
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ grupo_recursos }}"
        name: nic-vm
        virtual_network: "{{ nombre_red }}"
        subnet_name: "{{ nombre_subred }}"
        security_group: "{{ nombre_nsg }}"
        ip_configurations:
          - name: ipconfig1
            public_ip_address_name: ip-publica-vm
            primary: true

    - name: Crear VM Linux
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ grupo_recursos }}"
        name: vm-devops-01
        vm_size: Standard_D2s_v3
        admin_username: azureuser
        ssh_password_enabled: false
        ssh_public_keys:
          - path: /home/azureuser/.ssh/authorized_keys
            key_data: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        network_interfaces: nic-vm
        image:
          publisher: Canonical
          offer: 0001-com-ubuntu-server-focal
          sku: 20_04-lts
          version: latest
        boot_diagnostics:
          enabled: false
